<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Settings | RAKUN Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.materialcircles.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<style>
  a.ni { text-decoration: none; color: inherit; display: flex; }
</style>
</head>
<body>
<div class="sov" id="sov" onclick="closeMob()"></div>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sbl"><div class="lmark">RK</div><div class="ltxt">RAKUN<small>Admin Panel</small></div></div>
  <nav class="snav">
    <div class="ngl">Management</div>
    <a href="content.html" class="ni"><span class="material-symbols-outlined ic">inventory_2</span><span class="lbl">Content</span></a>
    <a href="pages.html" class="ni"><span class="material-symbols-outlined ic">web</span><span class="lbl">Pages</span></a>
    
    <div class="ngl">System</div>
    <div class="ni on" data-p="settings"><span class="material-symbols-outlined ic">settings</span><span class="lbl">Settings</span></div>
  </nav>
  <div class="sft"><div class="av">AD</div><div class="ui"><div class="un">Admin</div><div class="ur">Super Administrator</div></div></div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="tbt" id="dtt" onclick="toggleSidebar()"><span class="material-symbols-outlined">menu</span></button>
    <button class="tbt" id="mbt" style="display:none" onclick="openMob()"><span class="material-symbols-outlined">menu</span></button>
    <span class="tt">Global Settings</span>
    <span class="tc">/ System</span>
    <div class="tr">
      <button class="btn bg2b bxs bv"><span class="material-symbols-outlined ic" style="font-size:15px">open_in_new</span>Visit Site</button>
      <div class="av tav">AD</div>
    </div>
  </div>

  <div class="ct">
    <div class="pn on" id="pn-settings">
      <div class="ph"><div class="pht"><h1>Settings</h1><p>Global project configuration & site-wide SEO</p></div></div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px" id="stgg">
        <div>
          <div class="tw" style="padding:18px;margin-bottom:18px">
            <div style="font-size:13px;font-weight:800;margin-bottom:14px">General Info</div>
            <div class="fi" style="margin-bottom:12px"><label class="fl">Site Name</label><input class="fin" id="settings-siteName"></div>
            <div class="fi" style="margin-bottom:12px"><label class="fl">Default Language</label>
              <select class="fsel" id="settings-defaultLang">
                <option value="en">English (EN)</option><option value="ru">Russian (RU)</option>
                <option value="ka">Georgian (KA)</option><option value="hy">Armenian (HY)</option>
              </select>
            </div>
            <div class="fi"><label class="fl">Global Meta Description</label><textarea class="fta" id="settings-metaDescription" style="min-height:70px"></textarea></div>
          </div>

          <div class="tw" style="padding:18px">
            <div style="font-size:13px;font-weight:800;margin-bottom:14px">Language URL Prefixes</div>
            <div class="fg">
              <div class="fi"><label class="fl">English</label><div class="sr2"><div class="sp2">/</div><input class="fin si2" id="settings-prefix-en" value="en"></div></div>
              <div class="fi"><label class="fl">Russian</label><div class="sr2"><div class="sp2">/</div><input class="fin si2" id="settings-prefix-ru" value="ru"></div></div>
              <div class="fi"><label class="fl">Georgian</label><div class="sr2"><div class="sp2">/</div><input class="fin si2" id="settings-prefix-ka" value="ka"></div></div>
              <div class="fi"><label class="fl">Armenian</label><div class="sr2"><div class="sp2">/</div><input class="fin si2" id="settings-prefix-hy" value="hy"></div></div>
            </div>
          </div>
        </div>

        <div>
          <div class="tw" style="padding:18px;margin-bottom:18px">
            <div style="font-size:13px;font-weight:800;margin-bottom:14px">Admin Profile</div>
            <div class="fi" style="margin-bottom:12px"><label class="fl">Admin Display Name</label><input class="fin" id="settings-adminName"></div>
          </div>
          
          <div class="tw" style="padding:18px">
            <div style="font-size:13px;font-weight:800;margin-bottom:14px">Firebase Connection</div>
            <div class="fi" style="margin-bottom:12px"><label class="fl">Project ID</label><input class="fin" value="racun-shop" readonly style="opacity:.6"></div>
            <div class="fi" style="margin-bottom:14px"><label class="fl">Status</label><input class="fin" id="fb-status" value="Connecting…" readonly style="opacity:.6"></div>
          </div>
        </div>
      </div>

      <div style="margin-top:18px;text-align:right">
        <button class="btn bp" onclick="saveSettings()"><span class="material-symbols-outlined ic">save</span>Save All Settings</button>
      </div>
    </div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, terminate } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGXs4wc4vcxxy2cMoHMC8_MlD9S_chSQY",
  authDomain: "racun-shop.firebaseapp.com",
  projectId: "racun-shop",
  storageBucket: "racun-shop.appspot.com",
  messagingSenderId: "569457770232",
  appId: "1:569457770232:web:5a2737d1ee270459f3050d"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
window.addEventListener('beforeunload', () => terminate(db).catch(()=>{}));

function getV(id) { return document.getElementById(id)?.value || ''; }
function setV(id, v) { const el=document.getElementById(id); if(el) el.value = v ?? ''; }

function showToast(msg, type='ok') {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div'); t.id='_toast';
    Object.assign(t.style, { position:'fixed',bottom:'28px',right:'28px',zIndex:'9999',padding:'13px 24px',borderRadius:'10px',fontSize:'14px',fontWeight:'700',color:'#fff',boxShadow:'0 4px 24px rgba(0,0,0,.28)',transition:'opacity .35s',pointerEvents:'none' });
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.background = type==='ok' ? '#22c55e' : '#ef4444'; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(()=>{ t.style.opacity='0'; }, 3200);
}

async function loadSettings() {
  setV('fb-status', 'Loading…');
  try {
    const snap = await getDoc(doc(db, 'settings', 'main'));
    if (snap.exists()) {
      const s = snap.data();
      setV('settings-siteName', s.siteName || '');
      setV('settings-defaultLang', s.defaultLang || 'en');
      setV('settings-metaDescription', s.metaDescription || '');
      setV('settings-adminName', s.admin || '');
      if (s.languagePrefixes) {
        setV('settings-prefix-en', s.languagePrefixes.en || 'en');
        setV('settings-prefix-ru', s.languagePrefixes.ru || 'ru');
        setV('settings-prefix-ka', s.languagePrefixes.ka || 'ka');
        setV('settings-prefix-hy', s.languagePrefixes.hy || 'hy');
      }
      setV('fb-status', 'Connected ✓');
    }
  } catch(err) {
    console.error(err);
    setV('fb-status', 'Error loading settings');
    showToast('Load failed', 'err');
  }
}

window.saveSettings = async function() {
  const data = {
    siteName: getV('settings-siteName'),
    defaultLang: getV('settings-defaultLang'),
    metaDescription: getV('settings-metaDescription'),
    admin: getV('settings-adminName'),
    languagePrefixes: {
      en: getV('settings-prefix-en') || 'en',
      ru: getV('settings-prefix-ru') || 'ru',
      ka: getV('settings-prefix-ka') || 'ka',
      hy: getV('settings-prefix-hy') || 'hy',
    },
  };
  try {
    await setDoc(doc(db, 'settings', 'main'), data, { merge: true });
    showToast('✅ All settings saved!');
  } catch(err) {
    showToast('Save failed', 'err');
  }
};

window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('col');
window.openMob = () => { document.getElementById('sidebar').classList.add('mo'); document.getElementById('sov').classList.add('on'); };
window.closeMob = () => { document.getElementById('sidebar').classList.remove('mo'); document.getElementById('sov').classList.remove('on'); };

loadSettings();
</script>
</body>
</html>
